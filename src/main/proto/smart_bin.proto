syntax = "proto3";

package smartbin;

option java_multiple_files = true;
option java_package = "ie.nci.smartwaste.smartbin";
option java_outer_classname = "SmartBinProto";

service SmartBinService {

  rpc RegisterBin(RegisterBinRequest)
      returns (RegisterBinResponse);

  rpc UpdateFillLevel(UpdateFillLevelRequest)
      returns (UpdateFillLevelResponse);

  rpc GetBinStatus(GetBinStatusRequest)
      returns (GetBinStatusResponse);

  rpc ReportDamage(ReportDamageRequest)
      returns (ReportDamageResponse);

  rpc StreamBinsNeedingCollection(BinsNeedingCollectionRequest)
      returns (stream GetBinStatusResponse);

  rpc MonitorCollectionRoute(stream CollectionUpdate)
      returns (stream CollectionFeedback);
}

message RegisterBinRequest {
  string bin_id = 1;
  string location = 2;
  string waste_type = 3;
  int32 capacity_litres = 4;
}

message RegisterBinResponse {
  bool success = 1;
  string message = 2;
}

message UpdateFillLevelRequest {
  string bin_id = 1;
  int32 fill_level_percentage = 2;
}

message UpdateFillLevelResponse {
  bool success = 1;
  string message = 2;
}

message GetBinStatusRequest {
  string bin_id = 1;
}

message GetBinStatusResponse {
  string bin_id = 1;
  string location = 2;
  string waste_type = 3;
  int32 capacity_litres = 4;
  int32 fill_level_percentage = 5;
  bool damaged = 6;
}

message ReportDamageRequest {
  string bin_id = 1;
  string damage_description = 2;
}

message ReportDamageResponse {
  bool success = 1;
  string message = 2;
}

message BinsNeedingCollectionRequest {
  int32 minimum_fill_level = 1;
}

message CollectionUpdate {
  string truck_id = 1;
  string bin_id = 2;
  int32 fill_level_percentage = 3;
  bool collected = 4;
  bool damaged = 5;
}

message CollectionFeedback {
  string bin_id = 1;
  string instruction = 2;
  string priority = 3;
}
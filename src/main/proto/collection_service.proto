syntax = "proto3";

package collection;

option java_multiple_files = true;
option java_package = "ie.nci.smartwaste.collection";
option java_outer_classname = "CollectionServiceProto";

service CollectionService {

  rpc AssignCollection(AssignCollectionRequest)
      returns (AssignCollectionResponse);

  rpc CompleteCollection(CompleteCollectionRequest)
      returns (CompleteCollectionResponse);

  rpc GetCollectionRoute(GetCollectionRouteRequest)
      returns (GetCollectionRouteResponse);
}

message AssignCollectionRequest {
  string collection_id = 1;
  string bin_id = 2;
  string vehicle_id = 3;
  string scheduled_date = 4;
}

message AssignCollectionResponse {
  bool success = 1;
  string message = 2;
}

message CompleteCollectionRequest {
  string collection_id = 1;
  int32 collected_amount_litres = 2;
}

message CompleteCollectionResponse {
  bool success = 1;
  string message = 2;
}

message GetCollectionRouteRequest {
  string vehicle_id = 1;
}

message CollectionStop {
  string collection_id = 1;
  string bin_id = 2;
  string scheduled_date = 3;
  bool completed = 4;
}

message GetCollectionRouteResponse {
  string vehicle_id = 1;
  repeated CollectionStop stops = 2;
}